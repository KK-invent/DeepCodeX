      <stop offset="1" stop-color="#4D6BFE"/>
    </linearGradient>
  </defs>
  <rect width="980" height="260" rx="42" fill="#ffffff"/>
  <g>
    <rect x="56" y="36" width="188" height="188" rx="48" fill="#F7F4FF"/>
    <path d="M102 84L198 176" fill="none" stroke="url(#xGradient)" stroke-width="34" stroke-linecap="round"/>
