<svg xmlns="http://www.w3.org/2000/svg" width="980" height="260" viewBox="0 0 980 260" role="img" aria-labelledby="title desc">
  <title id="title">DeepCodeX 中文标志</title>
  <desc id="desc">DeepCodeX 字标，搭配原创紫色渐变 X 图标。</desc>
  <defs>
    <linearGradient id="xGradient" x1="116" y1="88" x2="224" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B16CFF"/>
