<svg xmlns="http://www.w3.org/2000/svg" width="610" height="180" viewBox="0 0 610 180" role="img" aria-labelledby="title desc">
  <title id="title">DeepCodeX 中文标志</title>
  <desc id="desc">DeepCodeX 字标，采用深海军蓝文字和原创极简蓝青渐变 X。</desc>
  <defs>
    <linearGradient id="xGradient" x1="490" y1="50" x2="570" y2="132" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#335BFF"/>
      <stop offset=".5" stop-color="#23C7F6"/>
      <stop offset="1" stop-color="#2547DB"/>
    </linearGradient>
  </defs>
  <g font-family="'PingFang SC','Hiragino Sans GB','Noto Sans CJK SC','Microsoft YaHei',Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <text x="32" y="116" fill="#061842" font-size="92" font-weight="400" letter-spacing="0">DeepCode</text>
    <text x="490" y="116" fill="url(#xGradient)" font-size="92" font-weight="520" letter-spacing="0">X</text>
  </g>
</svg>
