<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-labelledby="title desc">
  <title id="title">DeepCodeX light hero</title>
  <desc id="desc">Original DeepCodeX light hero with a navy wordmark, cyan-to-blue gradient X, and soft blue light trails.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1672" y2="941" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#DCE9FF"/>
      <stop offset=".35" stop-color="#F8FBFF"/>
      <stop offset=".7" stop-color="#F5F1FF"/>
      <stop offset="1" stop-color="#7C6DFF"/>
    </linearGradient>
    <linearGradient id="bottomGlow" x1="0" y1="941" x2="1672" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6EA8FF" stop-opacity=".92"/>
      <stop offset=".45" stop-color="#DCEAFF" stop-opacity=".5"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="xGradient" x1="1190" y1="394" x2="1294" y2="516" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#335BFF"/>
      <stop offset=".5" stop-color="#23C7F6"/>
      <stop offset="1" stop-color="#2547DB"/>
    </linearGradient>
    <linearGradient id="trail" x1="-60" y1="820" x2="1740" y2="690" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".2"/>
      <stop offset=".34" stop-color="#FFFFFF" stop-opacity=".92"/>
      <stop offset=".72" stop-color="#B7D3FF" stop-opacity=".66"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity=".1"/>
    </linearGradient>
    <filter id="softBlur" x="-10%" y="-20%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1672" height="941" fill="url(#sky)"/>
  <rect width="1672" height="941" fill="url(#bottomGlow)"/>
  <path d="M-96 842C266 744 492 790 740 832c298 50 545 12 1028-206" fill="none" stroke="#FFFFFF" stroke-opacity=".28" stroke-width="170" filter="url(#softBlur)"/>
  <path d="M-80 716C264 839 542 866 834 838c339-32 544-126 918-200" fill="none" stroke="url(#trail)" stroke-width="18" stroke-linecap="round"/>
  <path d="M-78 762C224 844 512 906 835 882c337-25 585-120 923-244" fill="none" stroke="url(#trail)" stroke-width="10" stroke-linecap="round" opacity=".75"/>
  <path d="M-64 806C246 874 516 932 852 912c328-20 594-118 910-256" fill="none" stroke="#FFFFFF" stroke-opacity=".72" stroke-width="6" stroke-linecap="round"/>
  <path d="M-40 635C252 820 512 858 784 829c348-37 604-137 964-227" fill="none" stroke="#FFFFFF" stroke-opacity=".42" stroke-width="4" stroke-linecap="round"/>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="156" font-weight="400" letter-spacing="0">
    <text x="391" y="512" fill="#061842">DeepCode</text>
    <text x="1187" y="512" fill="url(#xGradient)" font-weight="520">X</text>
  </g>
</svg>
