<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="420" viewBox="0 0 1120 420" role="img" aria-labelledby="title desc">
  <title id="title">DeepCodeX 安全门禁</title>
  <desc id="desc">概览本机密钥、成品包审计、离线指引和分阶段升级门禁的极简评分图。</desc>
  <defs>
    <style>
      .bg{fill:#f8faff}
      .card{fill:#fff;stroke:#dbe3ff;stroke-width:2}
      .txt{font-family:'PingFang SC','Hiragino Sans GB','Noto Sans CJK SC','Microsoft YaHei',Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#0f2942}
      .sub{fill:#56617a}
      .bar{fill:#e3e8ff}
      .fill{fill:#4D6BFE}
    </style>
  </defs>
  <rect class="bg" width="1120" height="420" rx="32"/>
  <text class="txt" x="64" y="70" font-size="34" font-weight="760">安全门禁一览</text>
  <text class="txt sub" x="64" y="108" font-size="18">这些小检查能让私有成品包更容易信任，也更容易解释。</text>

  <g transform="translate(64 158)">
    <rect class="card" width="224" height="164" rx="22"/>
    <text class="txt" x="24" y="48" font-size="22" font-weight="720">本机密钥</text>
    <text class="txt sub" x="24" y="80" font-size="15">不打印访问密钥</text>
    <rect class="bar" x="24" y="112" width="176" height="12" rx="6"/>
    <rect class="fill" x="24" y="112" width="168" height="12" rx="6"/>
  </g>
  <g transform="translate(320 158)">
    <rect class="card" width="224" height="164" rx="22"/>
    <text class="txt" x="24" y="48" font-size="22" font-weight="720">成品包审计</text>
    <text class="txt sub" x="24" y="80" font-size="15">密钥、路径、运行态文件</text>
    <rect class="bar" x="24" y="112" width="176" height="12" rx="6"/>
    <rect class="fill" x="24" y="112" width="176" height="12" rx="6"/>
  </g>
  <g transform="translate(576 158)">
    <rect class="card" width="224" height="164" rx="22"/>
    <text class="txt" x="24" y="48" font-size="22" font-weight="720">安装指引</text>
    <text class="txt sub" x="24" y="80" font-size="15">Codex 检测与服务地址</text>
    <rect class="bar" x="24" y="112" width="176" height="12" rx="6"/>
    <rect class="fill" x="24" y="112" width="164" height="12" rx="6"/>
  </g>
  <g transform="translate(832 158)">
    <rect class="card" width="224" height="164" rx="22"/>
    <text class="txt" x="24" y="48" font-size="22" font-weight="720">升级门禁</text>
    <text class="txt sub" x="24" y="80" font-size="15">预构建、冒烟、应用</text>
    <rect class="bar" x="24" y="112" width="176" height="12" rx="6"/>
    <rect class="fill" x="24" y="112" width="152" height="12" rx="6"/>
  </g>
</svg>
