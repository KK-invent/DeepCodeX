name: Documentation issue
description: Report unclear, missing, or outdated documentation.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: textarea
    id: page
    attributes:
      label: Page or section
      description: Which README or docs file is unclear?
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What was confusing or missing?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Suggested wording or outcome
      description: What should the documentation say instead?
    validations:
      required: false
